name: Release and publish

# Every push to main (direct or via merged PR) bumps the patch version,
# promotes the CHANGELOG [Unreleased] section, tags the release, and publishes to npm.
#
# The version-bump commit + tag are pushed back to main using a GitHub App token
# (squarefi-release-bot) so it can pass branch protection. Secrets required:
#   RELEASE_APP_ID, RELEASE_APP_PRIVATE_KEY
#
# npm auth is handled via Trusted Publisher (OIDC) — no NPM_TOKEN secret required.
# Configure at npmjs.com -> package -> Settings -> Trusted Publisher:
#   Organization/user: squarefi-tech, Repository: bff-api-module-npm, Workflow: publish.yml

on:
  push:
    branches:
      - main

# Serialize releases so two quick merges don't race on the version bump / push.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC trusted publishing (and provenance)

env:
  HUSKY: 0 # don't install/run husky hooks in CI (pre-commit needs API_DOCS_URL)

jobs:
  release:
    runs-on: ubuntu-latest
    # The bump commit is tagged with [skip ci]; GitHub skips it automatically, this is belt-and-suspenders.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; Node 20 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build

      - name: Configure git identity (the app's bot user)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Promote CHANGELOG [Unreleased] to the new version
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const { version } = require('./package.json');
          const date = new Date().toISOString().slice(0, 10);
          const path = 'CHANGELOG.md';
          let md = fs.readFileSync(path, 'utf8');
          // Insert a fresh empty [Unreleased] above the promoted version section.
          md = md.replace(/## \[Unreleased\]/, `## [Unreleased]\n\n## [${version}] - ${date}`);
          fs.writeFileSync(path, md);
          EOF

      - name: Commit, tag and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v$VERSION [skip ci]"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push --follow-tags origin HEAD:main

      # No NODE_AUTH_TOKEN — npm authenticates to the registry via OIDC.
      - run: npm publish
